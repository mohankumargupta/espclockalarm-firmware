substitutions:
  tft_width: 284
  tft_height: 76
  # tft_width: 320
  # tft_height: 240

esphome:
  name: mervclock

esp32:
  board: esp32-s3-devkitm-1
  framework:
    type: esp-idf

psram:
  mode: quad
  speed: 120MHz

logger:

wifi:
  ssid: "Wokwi-GUEST"

api:

spi:
  clk_pin: GPIO14
  mosi_pin: GPIO13

font:
  - file: "digital-7.ttf"
    id: digital7font
    size: 48

display:
  - platform: mipi_spi
    model: ILI9341
    id: mylcd
    dc_pin: GPIO2
    #reset_pin: 0
    cs_pin: GPIO15
    rotation: 0
    invert_colors: false
    update_interval: never
    #color_depth: 8
    #show_test_card: true
    color_order: bgr
    dimensions:
      width: ${tft_width}
      height: ${tft_height}
      offset_width: "0"
      offset_height: "30"
    transform:
      swap_xy: true
      mirror_x: false
      mirror_y: false

lvgl:
  buffer_size: 25%
  bg_color: black
  text_color: white
  pages:
    - id: main_page
      widgets:
        - obj:
            width: 100%
            height: 100%
            align: CENTER
            bg_opa: TRANSP
            border_width: 1
            border_color: white
            radius: 0
        - label:
            text: "6:07"
            align: CENTER
            text_font: digital7font

 

    